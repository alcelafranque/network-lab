frr defaults datacenter
log syslog informational
service integrated-vtysh-config
!
ip forwarding
ipv6 forwarding
!
interface eth1
 ip ospf network point-to-point
exit
!
vrf HUBSVC
 vni 100
exit-vrf
!
vrf spoke
 vni 110
exit-vrf
!
router ospf
 ospf router-id 192.0.2.4
 network 192.0.2.0/24 area 0
 passive-interface dummy0
exit
!
ip nht resolve-via-default
!
router bgp 65010
 bgp router-id 192.0.2.4
 no bgp default ipv4-unicast
 neighbor 192.0.2.1 remote-as 65010
 neighbor 192.0.2.1 update-source dummy0
 !
 address-family l2vpn evpn
  neighbor 192.0.2.1 activate
  advertise-all-vni
 exit-address-family
exit
!
! HUBSVC = services/default VRF, present on every node (L3VNI 100). Receives the
! hub default from the fabric via EVPN (RT 65010:100). No local interface/neighbor.
router bgp 65010 vrf HUBSVC
 bgp router-id 192.0.2.4
 !
 address-family l2vpn evpn
  rd 192.0.2.4:100
  route-target import 65010:100
 exit-address-family
exit
!
! spoke = tenant VRF. Advertises its LAN (RT 65010:110). Its default is a HOP
! into HUBSVC (leaked via 'import vrf HUBSVC', default-only), NOT a direct EVPN
! import - so the tenant never imports a hub/peer RT (keeps spokes isolated).
router bgp 65010 vrf spoke
 bgp router-id 192.0.2.4
 !
 address-family ipv4 unicast
  redistribute connected
  import vrf route-map LEAK_DEFAULT4
  import vrf HUBSVC
 exit-address-family
 !
 address-family ipv6 unicast
  redistribute connected
  import vrf route-map LEAK_DEFAULT6
  import vrf HUBSVC
 exit-address-family
 !
 address-family l2vpn evpn
  advertise ipv4 unicast
  advertise ipv6 unicast
  rd 192.0.2.4:110
  route-target export 65010:110
  ! Sentinel (unused) import RT: overrides FRR's default auto-import of the
  ! VNI-derived RT (65010:110). Without it the tenant would import its own
  ! export RT and learn the OTHER spoke. The default arrives via the HUBSVC
  ! leak, so the tenant imports nothing real from EVPN -> spokes stay isolated.
  route-target import 65010:65000
 exit-address-family
exit
!
ip prefix-list PL_DEFAULT4 seq 5 permit 0.0.0.0/0
ipv6 prefix-list PL_DEFAULT6 seq 5 permit ::/0
!
route-map LEAK_DEFAULT4 permit 10
 match ip address prefix-list PL_DEFAULT4
exit
!
route-map LEAK_DEFAULT6 permit 10
 match ipv6 address prefix-list PL_DEFAULT6
exit
!
end
