frr defaults datacenter
log syslog informational
service integrated-vtysh-config
!
ip forwarding
ipv6 forwarding
!
ip nht resolve-via-default
!
! HUBSVC: originate the default down to the fabric, import SPKSVC for the
! inter-spoke hairpin, but advertise ONLY the default outbound (ONLY_DEFAULT*_OUT
! keeps the leaked spoke routes from being re-advertised -> spoke isolation).
! The default is originated CONDITIONALLY (default-originate route-map COND_*):
! FRR only advertises 0/0 / ::/0 while a spoke prefix is present in this VRF
! (via import vrf SPKSVC). So after a reboot the firewall stays silent on the
! default until its SPKSVC session has converged -> no transient blackhole where
! spokes point at a firewall that cannot yet forward to the other spokes.
router bgp 65000 vrf HUBSVC
 bgp router-id 192.0.2.2
 no bgp default ipv4-unicast
 neighbor 192.0.2.16 remote-as 65010
 neighbor 2001:db8:f0:: remote-as 65010
 !
 address-family ipv4 unicast
  neighbor 192.0.2.16 activate
  neighbor 192.0.2.16 default-originate route-map COND_DEFAULT4
  neighbor 192.0.2.16 route-map ONLY_DEFAULT4_OUT out
  import vrf SPKSVC
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:f0:: activate
  neighbor 2001:db8:f0:: default-originate route-map COND_DEFAULT6
  neighbor 2001:db8:f0:: route-map ONLY_DEFAULT6_OUT out
  import vrf SPKSVC
 exit-address-family
exit
!
router bgp 65000 vrf SPKSVC
 bgp router-id 192.0.2.2
 no bgp default ipv4-unicast
 neighbor 192.0.2.18 remote-as 65010
 neighbor 2001:db8:f1:: remote-as 65010
 !
 address-family ipv4 unicast
  neighbor 192.0.2.18 activate
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 2001:db8:f1:: activate
 exit-address-family
exit
!
ip prefix-list PL_DEFAULT4 seq 5 permit 0.0.0.0/0
ipv6 prefix-list PL_DEFAULT6 seq 5 permit ::/0
!
! Spoke prefixes: match any spoke subnet collected in this VRF. Used to gate
! conditional default-origination (only advertise the default once a spoke
! route is present).
ip prefix-list PL_SPOKES4 seq 5 permit 198.51.100.0/24 ge 28
ipv6 prefix-list PL_SPOKES6 seq 5 permit 2001:db8::/32 ge 64 le 64
!
route-map ONLY_DEFAULT4_OUT permit 10
 match ip address prefix-list PL_DEFAULT4
exit
!
route-map ONLY_DEFAULT6_OUT permit 10
 match ipv6 address prefix-list PL_DEFAULT6
exit
!
route-map COND_DEFAULT4 permit 10
 match ip address prefix-list PL_SPOKES4
exit
!
route-map COND_DEFAULT6 permit 10
 match ipv6 address prefix-list PL_SPOKES6
exit
!
end
